<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>현체로그 - 우리들의 체험학습 기록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes tv-noise {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            20% { transform: translate(-10%, 5%); }
            30% { transform: translate(5%, -10%); }
            40% { transform: translate(-5%, 15%); }
            50% { transform: translate(-10%, 5%); }
            60% { transform: translate(15%, 0); }
            70% { transform: translate(0, 10%); }
            80% { transform: translate(-15%, 0); }
            90% { transform: translate(10%, 5%); }
        }
        .noise-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-color: #1a1a1a;
            opacity: 0.15;
            animation: tv-noise 0.2s infinite;
            position: absolute;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            width: 200%; height: 200%;
            z-index: 0;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html { scroll-behavior: smooth; }
        /* object-fit cover를 유지하되 transform scale을 섞어 줌 */
        video { object-fit: cover; width: 100%; height: 100%; transform-origin: center; }
    </style>
</head>
<body class="bg-sky-50 font-sans text-gray-800 h-[100dvh] overflow-hidden flex flex-col items-center justify-center">

    <!-- Loading Screen -->
    <div id="loading-screen" class="absolute inset-0 z-[70] bg-[url('cover.png')] bg-cover bg-center bg-no-repeat flex flex-col items-center justify-center transition-opacity duration-300">
        <!-- 배경 블러 처리 (글씨가 잘 보이도록) -->
        <div class="absolute inset-0 bg-white/40 backdrop-blur-lg"></div>
        <div class="z-10 flex flex-col items-center">
            <svg id="loading-spinner" class="animate-spin h-12 w-12 text-yellow-400 drop-shadow-md mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p id="loading-text" class="font-bold text-sm tracking-wider animate-pulse text-center px-6 text-blue-900 drop-shadow-sm">데이터를 불러오는 중입니다...</p>
            <p id="error-details" class="text-sm font-bold text-pink-600 mt-4 px-6 text-center whitespace-pre-wrap bg-white/60 p-2 rounded-lg"></p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="absolute inset-0 z-[60] bg-[url('cover.png')] bg-cover bg-center bg-no-repeat flex flex-col items-center justify-start pt-[12dvh] px-6 transition-opacity duration-500">
        <!-- 유리 질감(Frosted Glass) 효과를 준 로그인 박스 -->
        <div class="w-full max-w-xs text-center bg-white/20 backdrop-blur-md border border-white/40 p-7 rounded-[32px] shadow-[0_8px_32px_rgba(0,0,0,0.15)]">
            <h1 class="text-5xl font-black mb-1 text-white drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)] tracking-tight">현체로그</h1>
            <p class="text-blue-900 font-extrabold text-sm mb-8 drop-shadow-sm">우리들의 체험학습 기록</p>
            
            <input id="login-id" type="number" placeholder="학번 (예: 30201)" class="w-full p-3.5 rounded-2xl mb-3 bg-white/90 text-blue-900 font-bold placeholder-blue-300 focus:outline-none focus:ring-4 focus:ring-yellow-400/60 shadow-inner">
            <input id="login-pw" type="password" placeholder="비밀번호" class="w-full p-3.5 rounded-2xl mb-6 bg-white/90 text-blue-900 font-bold placeholder-blue-300 focus:outline-none focus:ring-4 focus:ring-yellow-400/60 shadow-inner">
            
            <!-- 교복 색상에 맞춘 노란 버튼 -->
            <button onclick="handleLogin()" class="w-full bg-yellow-400 text-blue-900 font-black text-lg py-3.5 rounded-2xl shadow-[0_4px_14px_0_rgba(250,204,21,0.6)] hover:scale-[1.02] active:scale-[0.98] transition-transform">
                시작하기
            </button>
            <p id="login-error" class="text-pink-600 text-sm mt-4 hidden font-bold bg-white/60 py-2 rounded-lg backdrop-blur-sm">학번이나 비밀번호를 확인해주세요.</p>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="absolute inset-0 z-[65] bg-gray-900/95 flex flex-col items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-[400px] flex flex-col items-center">
            <h2 class="text-white font-bold text-lg mb-1">화면 조정</h2>
            <p class="text-gray-300 text-xs mb-1">드래그로 위치를, 두 손가락으로 크기를 조절하세요.</p>
            <p id="preview-file-size" class="text-yellow-400 text-[10px] font-bold mb-2">용량: -MB</p>
            <div id="preview-viewport" class="relative w-full rounded-[24px] overflow-hidden bg-black shadow-lg border border-white/20 touch-none flex items-center justify-center cursor-grab active:cursor-grabbing">
                <video id="preview-video" src="" autoplay loop muted playsinline style="object-position: 50% 50%; transform: scale(1);"></video>
            </div>
            <div class="w-full mt-4 flex flex-col gap-3 text-center">
                <input type="text" id="preview-text" placeholder="짧은 한 줄 남기기 (선택)" maxlength="20" class="w-full bg-white/10 text-white px-4 py-3 rounded-xl border border-white/20 focus:outline-none text-sm">
                <div class="flex gap-2">
                    <button onclick="closePreviewModal()" class="flex-1 bg-gray-700 text-white font-bold py-3 rounded-xl">취소</button>
                    <button id="upload-btn" onclick="confirmUpload()" class="flex-1 bg-yellow-400 text-gray-900 font-bold py-3 rounded-xl">올리기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="w-full max-w-[430px] h-full sm:h-[90dvh] bg-white overflow-hidden shadow-2xl flex flex-col relative hidden opacity-0 transition-opacity duration-500">
        <!-- 상단 헤더 높이 1/2로 축소 (h-[40px], py-1) -->
        <header class="flex items-center justify-between px-3 py-1.5 z-20 bg-white shadow-sm h-[45px] shrink-0">
            <div class="flex items-center gap-1">
                <select id="group-select" onchange="handleGroupChange(this.value)" class="font-black text-sm text-gray-800 focus:outline-none bg-transparent cursor-pointer"></select>
            </div>
            <div class="flex items-center gap-1" id="dots-container"></div>
            <div class="flex items-center gap-2">
                <div class="font-bold text-xs text-gray-800" id="current-time-display">--:--</div>
                <button onclick="logout()" class="bg-gray-200 text-gray-700 text-[10px] px-2 py-1 rounded font-bold hover:bg-gray-300">로그아웃</button>
            </div>
        </header>
        
        <!-- 메인 스크롤 영역 -->
        <main id="main-scroll" class="flex-1 flex overflow-x-auto snap-x snap-mandatory hide-scrollbar bg-gray-100 relative items-center"></main>
    </div>

    <script>
        /**
         * ★ 수파베이스 설정
         */
        const SUPABASE_URL = 'https://bjlzzklznnihluucjqei.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqbHp6a2x6bm5paGx1dWNqcWVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTY3NTAsImV4cCI6MjA5MzUzMjc1MH0.YEeTAZzNUMA5tRFzDoFgvkix5oNy03KRmJT3owLVrIU'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /**
         * ★ 구글 앱스 스크립트(GAS) URL
         */
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwkbW4tdx3w7UL4_CkQSPG33g5rOTudGJ38NkZHcVfgplwgL6Rn-HFW0WCGT15Orongyw/exec';

        let MOCK_SHEET_DATA = { users: [], missions: [] };
        let UPLOADS = {};
        let currentUser = null;
        let currentGroupMembers = [];
        let groupMissions = [];
        let pendingUploadData = { file: null, time: null, studentId: null, topic: null };
        
        // 드래그 및 줌 상태 (픽셀 단위)
        let currentPanX = 0; 
        let currentPanY = 0;
        let currentScale = 1;

        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const mainScroll = document.getElementById('main-scroll');
        const dotsContainer = document.getElementById('dots-container');
        const groupSelect = document.getElementById('group-select');
        const currentTimeDisplay = document.getElementById('current-time-display');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const errorDetails = document.getElementById('error-details');
        const loadingSpinner = document.getElementById('loading-spinner');
        const previewModal = document.getElementById('preview-modal');
        const previewVideo = document.getElementById('preview-video');
        const previewViewport = document.getElementById('preview-viewport');
        const previewText = document.getElementById('preview-text');

        // ★ 시간 형식 정규화 함수 (1899년 문제 해결 및 시간 추출 강화)
        function formatTime(rawStr) {
            if (!rawStr) return '00:00';
            let str = String(rawStr);
            if (str.toLowerCase().includes('1899') || str.toLowerCase().includes('gmt') || str.toLowerCase().includes('sat') || str.toLowerCase().includes('dec')) {
                const d = new Date(str);
                if (!isNaN(d)) {
                    return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
                }
            }
            // 시간 형태(ex. 13:00, 13시 00분) 유연하게 파싱
            const match = str.match(/(\d{1,2})\s*[:시]\s*(\d{2})/);
            if (match) {
                let hour = parseInt(match[1], 10);
                if (str.includes('오후') && hour < 12) hour += 12;
                return `${hour.toString().padStart(2, '0')}:${match[2]}`;
            }
            return str.trim();
        }

        // 초기화: 데이터 로드
        async function init() {
            try {
                // 1. 구글 시트 데이터 로드 테스트
                loadingText.innerText = "데이터를 동기화 중입니다...";
                let res;
                try {
                    res = await fetch(GAS_WEB_APP_URL, { redirect: "follow" });
                } catch (gasErr) {
                    throw new Error("❌ 구글 시트 통신 실패!\n인터넷 연결을 확인하세요.");
                }
                
                let data;
                try {
                    data = await res.json();
                } catch(parseErr) {
                    throw new Error("❌ 구글 시트 권한 오류!\n\nGAS 배포 시 [액세스할 수 있는 사용자]를 반드시 [모든 사용자]로 설정하고 '새 배포'를 꼭 진행해주세요.");
                }

                if (!data || !data.users) {
                    throw new Error("❌ 구글 시트에서 올바른 데이터를 받지 못했습니다. 시트 내용을 확인하세요.");
                }
                MOCK_SHEET_DATA.users = data.users || [];
                
                // 미션 전체 로딩을 위한 처리 (a열 무관하게 b,c열만으로 구성됨)
                MOCK_SHEET_DATA.missions = (data.missions || []).map(m => ({
                    time: formatTime(m.time),
                    topic: m.topic,
                    date: m.date
                }));

                // 2. Supabase 연동 테스트
                const { data: dbUploads, error } = await supabaseClient.from('uploads').select('*');
                
                if (error) {
                    throw new Error(`❌ Supabase 에러!\n${error.message}`);
                }

                UPLOADS = {};
                if (dbUploads) {
                    dbUploads.forEach(item => {
                        const mTime = formatTime(item.mission_time);
                        if (!UPLOADS[mTime]) UPLOADS[mTime] = {};
                        UPLOADS[mTime][item.student_id] = {
                            videoUrl: item.video_url,
                            text: `${item.display_text}||POS:${item.object_pos}`
                        };
                    });
                }

                // 자동 로그인 체크 로직 추가
                const savedId = localStorage.getItem('autoLoginId');
                const savedPw = localStorage.getItem('autoLoginPw');
                if (savedId && savedPw) {
                    document.getElementById('login-id').value = savedId;
                    document.getElementById('login-pw').value = savedPw;
                    handleLogin(); // 로그인 정보가 있으면 바로 접속
                }

                loadingScreen.classList.add('opacity-0');
                setTimeout(() => loadingScreen.classList.add('hidden'), 300);
                
            } catch (err) {
                console.error(err);
                loadingSpinner.style.display = 'none';
                loadingText.classList.remove('animate-pulse', 'text-white');
                loadingText.classList.add('text-pink-400', 'text-xl');
                loadingText.innerText = "⚠️ 로딩 중 문제가 발생했습니다";
                errorDetails.innerText = err.message;
            }
        }
        window.onload = init;

        // 로그인
        function handleLogin() {
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value.trim();
            const user = MOCK_SHEET_DATA.users.find(u => u.id === id && u.pw === pw);

            if (user) {
                currentUser = user;
                // 자동 로그인을 위해 저장
                localStorage.setItem('autoLoginId', id);
                localStorage.setItem('autoLoginPw', pw);

                currentGroupMembers = MOCK_SHEET_DATA.users.filter(u => u.group === user.group);
                populateGroupDropdown();
                
                // ★ A열(그룹) 확인 로직 완전히 제거, 시간 기준 중복만 제거하고 모두 표시
                const seen = new Map();
                MOCK_SHEET_DATA.missions.forEach(m => {
                    if (!seen.has(m.time) && m.time !== '00:00') seen.set(m.time, m);
                });
                
                groupMissions = Array.from(seen.values()).sort((a,b) => {
                    const t1 = a.time.match(/(\d+):(\d+)/);
                    const t2 = b.time.match(/(\d+):(\d+)/);
                    const m1 = t1 ? parseInt(t1[1],10)*60 + parseInt(t1[2],10) : 0;
                    const m2 = t2 ? parseInt(t2[1],10)*60 + parseInt(t2[2],10) : 0;
                    return m1 - m2;
                });

                loginScreen.classList.add('opacity-0');
                setTimeout(() => {
                    loginScreen.classList.add('hidden');
                    mainApp.classList.remove('hidden');
                    setTimeout(() => mainApp.classList.remove('opacity-0'), 50);
                    renderApp();
                    scrollToMission(0);
                }, 300);
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // 로그아웃 (로컬스토리지 비우기 및 새로고침)
        function logout() {
            localStorage.removeItem('autoLoginId');
            localStorage.removeItem('autoLoginPw');
            location.reload();
        }

        // 업로드 준비 (미리보기 모달)
        function openPreviewModal(inputEl, time, studentId, topic) {
            if (!inputEl.files?.length) return;
            const file = inputEl.files[0];
            
            // ★ 용량 제한 확인 (10MB 제한)
            const maxSizeMB = 10;
            const currentSizeMB = (file.size / 1024 / 1024).toFixed(1);
            
            if (file.size > maxSizeMB * 1024 * 1024) { 
                alert(`⚠️ 용량이 너무 큽니다! (현재: ${currentSizeMB}MB)\n\n서버 용량 관리를 위해 ${maxSizeMB}MB 이하의 짧은 영상만 올릴 수 있습니다.\n휴대폰 앨범에서 영상 길이를 자르거나 화질을 낮춘 뒤 다시 선택해주세요.`); 
                inputEl.value = ''; // 선택 초기화
                return; 
            }

            pendingUploadData = { file, time, studentId, topic };
            
            // 초기화
            currentPanX = 0;
            currentPanY = 0;
            currentScale = 1;
            updatePreviewStyle();
            previewText.value = '';

            // 파일 사이즈 표시
            document.getElementById('preview-file-size').innerText = `선택된 영상: ${currentSizeMB}MB`;

            previewVideo.src = URL.createObjectURL(file);
            previewViewport.style.height = `${Math.max(180, mainScroll.clientHeight / (currentGroupMembers.length || 2))}px`;
            previewModal.classList.remove('hidden');
            setTimeout(() => previewModal.classList.remove('opacity-0'), 10);
        }

        // 실제 업로드 로직 (Supabase Storage -> DB -> GAS 백업)
        async function confirmUpload() {
            const { file, time, studentId, topic } = pendingUploadData;
            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.innerText = "업로드 중...";

            try {
                // 1. Supabase Storage 업로드 (파일명: 학번_미션시간_확장자)
                const safeTimeStr = time.replace(':', '');
                const fileName = `${studentId}_${safeTimeStr}_${Date.now()}.${file.name.split('.').pop()}`;
                
                const { data: storageData, error: storageError } = await supabaseClient.storage
                    .from('videos')
                    .upload(fileName, file);

                if (storageError) throw new Error("Storage 업로드 에러: " + storageError.message);

                // 2. Public URL 가져오기
                const { data: { publicUrl } } = supabaseClient.storage.from('videos').getPublicUrl(fileName);

                // 3. Supabase DB 기록 (px 위치값과 확대배율 Scale 함께 저장)
                const finalPosText = `${currentPanX.toFixed(1)}px,${currentPanY.toFixed(1)}px,${currentScale.toFixed(2)}`;
                const { error: dbError } = await supabaseClient.from('uploads').upsert({
                    student_id: studentId,
                    mission_time: time,
                    mission_topic: topic,
                    video_url: publicUrl,
                    display_text: previewText.value.trim(),
                    object_pos: finalPosText
                }, { onConflict: 'student_id, mission_time' });

                if (dbError) throw new Error("DB 기록 에러: " + dbError.message);

                // 4. 구글 시트 백업 (영상 자체는 Supabase에, 텍스트 정보와 주소만 시트에 백업)
                fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        studentId, time, videoUrl: publicUrl,
                        text: `${previewText.value.trim()}||POS:${finalPosText}`
                    })
                }).catch(e => console.log("시트 백업 실패:", e));

                // UI 업데이트
                if (!UPLOADS[time]) UPLOADS[time] = {};
                UPLOADS[time][studentId] = {
                    videoUrl: publicUrl,
                    text: `${previewText.value.trim()}||POS:${finalPosText}`
                };
                
                alert("업로드 완료!");
                closePreviewModal();
                renderApp();

            } catch (err) {
                console.error(err);
                alert("업로드 실패: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "올리기";
            }
        }

        function closePreviewModal() {
            previewModal.classList.add('opacity-0');
            setTimeout(() => { previewModal.classList.add('hidden'); previewVideo.src = ""; }, 300);
        }

        function populateGroupDropdown() {
            const groups = [...new Set(MOCK_SHEET_DATA.users.map(u => u.group))];
            groupSelect.innerHTML = groups.map(g => `<option value="${g}">${g}</option>`).join('');
            groupSelect.value = currentUser.group;
        }

        function handleGroupChange(g) {
            currentGroupMembers = MOCK_SHEET_DATA.users.filter(u => u.group === g);
            renderApp();
            scrollToMission(0);
        }

        // 메인 렌더링 함수
        function renderApp() {
            mainScroll.innerHTML = groupMissions.map(mission => `
                <div class="min-w-full h-full flex flex-col p-1 gap-1 snap-center justify-center">
                    ${currentGroupMembers.map(member => {
                        const up = UPLOADS[mission.time]?.[member.id];
                        const isMe = member.id === currentUser.id;
                        let pos = '50% 50%', dText = '', scale = 1;
                        
                        if (up) {
                            const p = up.text.split('||POS:');
                            dText = p[0];
                            if (p[1]) {
                                const coords = p[1].split(',');
                                if(coords.length >= 2) {
                                    // px 단위인 경우 (새로운 드래그 로직)
                                    if (coords[0].includes('px')) {
                                        pos = `calc(50% + ${coords[0]}) calc(50% + ${coords[1]})`;
                                    } else {
                                        // 호환성을 위한 구버전 퍼센트 단위
                                        pos = `${coords[0]}% ${coords[1]}%`;
                                    }
                                }
                                if(coords.length >= 3) scale = coords[2];
                            }
                        }

                        // 조원 간격을 최소화하고 중앙 정렬되도록 flex-1 사용
                        return `
                        <div class="relative flex-1 w-full rounded-[16px] overflow-hidden bg-black shadow-sm flex items-center justify-center">
                            ${up ? `
                                <video src="${up.videoUrl}" autoplay loop muted playsinline style="object-position:${pos}; transform: scale(${scale});"></video>
                                <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/40"></div>
                            ` : `
                                <div class="noise-bg"></div>
                                ${isMe ? `
                                    <div class="flex flex-col items-center z-20">
                                        <label class="bg-pink-500 text-white px-4 py-2 rounded-full font-bold cursor-pointer text-xs shadow-lg hover:scale-105 transition-transform">
                                            영상 선택
                                            <input type="file" accept="video/*" class="hidden" onchange="openPreviewModal(this,'${mission.time}','${member.id}','${mission.topic}')">
                                        </label>
                                        <span class="text-white/60 text-[8px] mt-1.5 font-bold bg-black/40 px-2 py-0.5 rounded-full backdrop-blur-sm">최대 10MB</span>
                                    </div>
                                ` : '<p class="text-white/30 font-bold text-[10px]">WAITING...</p>'}
                            `}
                            
                            <!-- 내용물 정중앙 및 양방향 정렬 -->
                            <div class="absolute inset-0 p-3 flex flex-col justify-between pointer-events-none">
                                <div class="flex justify-between items-start">
                                    <span class="bg-black/50 backdrop-blur-md text-white text-[9px] px-2.5 py-1 rounded-full border border-white/10 shadow-sm">${member.id}</span>
                                    <span class="text-white/80 text-[9px] drop-shadow-md">${mission.date}</span>
                                </div>
                                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[90%] text-center">
                                    <h2 class="text-white font-black text-3xl sm:text-4xl" style="text-shadow: 0 2px 10px rgba(0,0,0,0.6)">${mission.time}</h2>
                                    ${dText ? `<p class="inline-block bg-black/60 backdrop-blur-sm text-white text-[10px] px-3 py-1 rounded-lg mt-1 border border-white/10 max-w-full truncate">${dText}</p>` : ''}
                                </div>
                                <div class="flex justify-end">
                                    <span class="text-white/90 text-[9px] bg-black/40 backdrop-blur-sm px-2 py-1 rounded shadow-sm max-w-[80%] truncate">🎯 ${mission.topic}</span>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`).join('');
            updateDots();
        }

        function updateDots() {
            const idx = Math.round(mainScroll.scrollLeft / mainScroll.clientWidth);
            dotsContainer.innerHTML = groupMissions.map((m, i) => `
                <div class="transition-all duration-300 ${i === idx ? 'text-yellow-400 scale-125' : 'w-1.5 h-1.5 bg-gray-300 rounded-full'}">
                    ${i === idx ? '●' : ''}
                </div>
            `).join('');
            if (groupMissions[idx]) currentTimeDisplay.innerText = groupMissions[idx].time;
        }

        function scrollToMission(idx) {
            mainScroll.scrollTo({ left: mainScroll.clientWidth * idx, behavior: 'smooth' });
        }

        mainScroll.addEventListener('scroll', updateDots);

        // =====================================================================
        // 드래그 및 줌 조작 (모바일 핀치줌 & 데스크톱 마우스 완벽 호환)
        // =====================================================================
        let isDragging = false;
        let startX, startY, startPanX, startPanY;
        let initialPinchDistance = null;
        let initialScale = 1;

        // 비디오 스타일 업데이트 함수 (calc 사용으로 위치와 스케일을 분리)
        function updatePreviewStyle() {
            previewVideo.style.objectPosition = `calc(50% + ${currentPanX}px) calc(50% + ${currentPanY}px)`;
            previewVideo.style.transform = `scale(${currentScale})`;
        }
        
        // 1. 마우스 이벤트 (데스크톱)
        previewViewport.addEventListener('mousedown', e => {
            isDragging = true;
            startX = e.clientX; 
            startY = e.clientY;
            startPanX = currentPanX; 
            startPanY = currentPanY;
        });
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            // 스케일이 커질수록 1:1로 손가락을 따라가도록 dx, dy 보정
            const dx = (e.clientX - startX) / currentScale;
            const dy = (e.clientY - startY) / currentScale;
            // 화면 밖으로 완전히 벗어나지 못하도록 제한 (-1000px ~ 1000px)
            currentPanX = Math.max(-1000, Math.min(1000, startPanX + dx));
            currentPanY = Math.max(-1000, Math.min(1000, startPanY + dy));
            updatePreviewStyle();
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // 2. 마우스 휠로 확대/축소 (데스크톱)
        previewViewport.addEventListener('wheel', e => {
            e.preventDefault();
            currentScale += e.deltaY * -0.005;
            currentScale = Math.max(1, Math.min(5, currentScale));
            updatePreviewStyle();
        }, { passive: false });

        // 3. 터치 이벤트 (모바일 최적화: 1손가락 드래그, 2손가락 핀치 줌 동시 지원)
        previewViewport.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                startPanX = currentPanX;
                startPanY = currentPanY;
            } else if (e.touches.length === 2) {
                isDragging = false; // 줌할 때는 드래그 기준점 초기화를 위해 중단
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialScale = currentScale;
            }
        }, { passive: false });

        previewViewport.addEventListener('touchmove', e => {
            e.preventDefault(); // 기본 스크롤(위아래 스와이프) 방지
            
            if (e.touches.length === 1 && isDragging) {
                // 1손가락: 패닝 (위/아래/좌/우 이동)
                const dx = (e.touches[0].clientX - startX) / currentScale;
                const dy = (e.touches[0].clientY - startY) / currentScale;
                currentPanX = Math.max(-1000, Math.min(1000, startPanX + dx));
                currentPanY = Math.max(-1000, Math.min(1000, startPanY + dy));
                updatePreviewStyle();

            } else if (e.touches.length === 2 && initialPinchDistance !== null) {
                // 2손가락: 핀치 줌 (확대/축소)
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const scaleDiff = currentDistance / initialPinchDistance;
                currentScale = Math.max(1, Math.min(5, initialScale * scaleDiff));
                updatePreviewStyle();
            }
        }, { passive: false });

        previewViewport.addEventListener('touchend', e => {
            if (e.touches.length < 2) initialPinchDistance = null;
            if (e.touches.length === 0) isDragging = false;
        });

        previewViewport.addEventListener('touchcancel', e => {
            initialPinchDistance = null;
            isDragging = false;
        });

    </script>
</body>
</html>
