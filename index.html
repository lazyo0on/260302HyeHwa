<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>현체로그 - 우리들의 체험학습 기록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes tv-noise {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            20% { transform: translate(-10%, 5%); }
            30% { transform: translate(5%, -10%); }
            40% { transform: translate(-5%, 15%); }
            50% { transform: translate(-10%, 5%); }
            60% { transform: translate(15%, 0); }
            70% { transform: translate(0, 10%); }
            80% { transform: translate(-15%, 0); }
            90% { transform: translate(10%, 5%); }
        }
        .noise-bg {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-color: #1a1a1a;
            opacity: 0.15;
            animation: tv-noise 0.2s infinite;
            position: absolute;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            width: 200%; height: 200%;
            z-index: 0;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html { scroll-behavior: smooth; }
        video { object-fit: cover; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-gray-900 font-sans text-gray-800 h-screen overflow-hidden">

    <!-- Loading Screen -->
    <div id="loading-screen" class="absolute inset-0 z-[70] bg-gray-900/90 backdrop-blur-sm flex flex-col items-center justify-center text-white transition-opacity duration-300">
        <svg class="animate-spin h-10 w-10 text-yellow-400 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p id="loading-text" class="font-bold text-sm tracking-wider animate-pulse">데이터를 불러오는 중입니다...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="absolute inset-0 z-[60] bg-gray-900 flex flex-col items-center justify-center p-6 text-white transition-opacity duration-500">
        <div class="w-full max-w-xs text-center">
            <h1 class="text-4xl font-black mb-2 text-yellow-400 drop-shadow-lg">현체로그</h1>
            <p class="text-gray-400 text-sm mb-10">Supabase Edition</p>
            <input id="login-id" type="number" placeholder="학번 (예: 30201)" class="w-full p-4 rounded-2xl mb-3 text-gray-900 font-bold focus:outline-none">
            <input id="login-pw" type="password" placeholder="비밀번호" class="w-full p-4 rounded-2xl mb-6 text-gray-900 font-bold focus:outline-none">
            <button onclick="handleLogin()" class="w-full bg-yellow-400 text-gray-900 font-black text-lg py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-transform">
                시작하기
            </button>
            <p id="login-error" class="text-pink-400 text-sm mt-4 hidden font-medium">학번이나 비밀번호를 확인해주세요.</p>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="absolute inset-0 z-[65] bg-gray-900/95 flex flex-col items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-[400px] flex flex-col items-center">
            <h2 class="text-white font-bold text-lg mb-2">영상의 보여질 부분을 드래그하세요</h2>
            <div id="preview-viewport" class="relative w-full rounded-[24px] overflow-hidden bg-black shadow-lg border border-white/20 cursor-move touch-none">
                <video id="preview-video" src="" autoplay loop muted playsinline style="object-position: 50% 50%;"></video>
            </div>
            <div class="w-full mt-6 flex flex-col gap-3 text-center">
                <input type="text" id="preview-text" placeholder="짧은 한 줄 남기기 (선택)" maxlength="20" class="w-full bg-white/10 text-white px-4 py-3 rounded-xl border border-white/20 focus:outline-none">
                <div class="flex gap-2">
                    <button onclick="closePreviewModal()" class="flex-1 bg-gray-700 text-white font-bold py-3 rounded-xl">취소</button>
                    <button id="upload-btn" onclick="confirmUpload()" class="flex-1 bg-yellow-400 text-gray-900 font-bold py-3 rounded-xl">올리기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="flex justify-center items-center h-screen hidden opacity-0 transition-opacity duration-500">
        <div class="relative w-full max-w-[430px] h-full sm:h-[90vh] sm:rounded-[40px] bg-white overflow-hidden shadow-2xl flex flex-col border-yellow-300 sm:border-[8px]">
            <header class="flex items-center justify-between px-4 py-3 z-20 bg-white shadow-sm h-[60px]">
                <div class="flex items-center gap-1">
                    <select id="group-select" onchange="handleGroupChange(this.value)" class="font-black text-sm text-gray-800 focus:outline-none bg-transparent cursor-pointer"></select>
                </div>
                <div class="flex items-center gap-1.5" id="dots-container"></div>
                <div class="font-bold text-sm text-gray-800" id="current-time-display">--:--</div>
            </header>
            <main id="main-scroll" class="flex-1 flex overflow-x-auto snap-x snap-mandatory hide-scrollbar bg-gray-100 relative"></main>
            <div class="h-6 bg-white shrink-0"></div>
        </div>
    </div>

    <script>
        /**
         * ★ 수파베이스 설정 (본인의 프로젝트 정보로 교체하세요)
         */
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        /**
         * ★ 기존 GAS URL (시트 기록용)
         */
        const GAS_WEB_APP_URL = 'YOUR_GAS_URL';

        let MOCK_SHEET_DATA = { users: [], missions: [] };
        let UPLOADS = {};
        let currentUser = null;
        let currentGroupMembers = [];
        let groupMissions = [];
        let pendingUploadData = { file: null, time: null, studentId: null, topic: null };
        let currentObjPos = { x: 50, y: 50 };

        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const mainScroll = document.getElementById('main-scroll');
        const dotsContainer = document.getElementById('dots-container');
        const groupSelect = document.getElementById('group-select');
        const currentTimeDisplay = document.getElementById('current-time-display');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const previewModal = document.getElementById('preview-modal');
        const previewVideo = document.getElementById('preview-video');
        const previewViewport = document.getElementById('preview-viewport');
        const previewText = document.getElementById('preview-text');

        // 초기화: 데이터 로드
        async function init() {
            try {
                // 1. 유저 및 미션 정보 로드 (기존 GAS 활용)
                const res = await fetch(GAS_WEB_APP_URL);
                const data = await res.json();
                MOCK_SHEET_DATA.users = data.users || [];
                MOCK_SHEET_DATA.missions = data.missions || [];

                // 2. Supabase에서 업로드된 영상 기록 실시간 로드
                const { data: dbUploads, error } = await supabase.from('uploads').select('*');
                if (error) throw error;

                UPLOADS = {};
                dbUploads.forEach(item => {
                    if (!UPLOADS[item.mission_time]) UPLOADS[item.mission_time] = {};
                    UPLOADS[item.mission_time][item.student_id] = {
                        videoUrl: item.video_url,
                        text: `${item.display_text}||POS:${item.object_pos}`
                    };
                });

                // 미션 정렬 및 필터링
                const seen = new Map();
                MOCK_SHEET_DATA.missions.forEach(m => { if (!seen.has(m.time)) seen.set(m.time, m); });
                groupMissions = Array.from(seen.values()).sort((a,b) => {
                    const t1 = a.time.split(':').map(Number);
                    const t2 = b.time.split(':').map(Number);
                    return (t1[0]*60 + t1[1]) - (t2[0]*60 + t2[1]);
                });

                loadingScreen.classList.add('opacity-0');
                setTimeout(() => loadingScreen.classList.add('hidden'), 300);
            } catch (err) {
                console.error(err);
                alert("초기 로딩 실패. 설정을 확인하세요.");
            }
        }
        window.onload = init;

        // 로그인
        function handleLogin() {
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value.trim();
            const user = MOCK_SHEET_DATA.users.find(u => u.id === id && u.pw === pw);

            if (user) {
                currentUser = user;
                currentGroupMembers = MOCK_SHEET_DATA.users.filter(u => u.group === user.group);
                populateGroupDropdown();
                loginScreen.classList.add('opacity-0');
                setTimeout(() => {
                    loginScreen.classList.add('hidden');
                    mainApp.classList.remove('hidden');
                    setTimeout(() => mainApp.classList.remove('opacity-0'), 50);
                    renderApp();
                    scrollToMission(0);
                }, 500);
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // 업로드 준비
        function openPreviewModal(inputEl, time, studentId, topic) {
            if (!inputEl.files?.length) return;
            const file = inputEl.files[0];
            if (file.size > 50 * 1024 * 1024) { alert("50MB 이하만 가능합니다."); return; }

            pendingUploadData = { file, time, studentId, topic };
            previewVideo.src = URL.createObjectURL(file);
            previewViewport.style.height = `${mainScroll.clientHeight / (currentGroupMembers.length || 2)}px`;
            previewModal.classList.remove('hidden');
            setTimeout(() => previewModal.classList.remove('opacity-0'), 10);
        }

        // 실제 업로드 로직 (Supabase + GAS)
        async function confirmUpload() {
            const { file, time, studentId, topic } = pendingUploadData;
            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.innerText = "업로드 중...";

            try {
                // 1. Supabase Storage 업로드
                const fileName = `${studentId}_${Date.now()}.${file.name.split('.').pop()}`;
                const { data: storageData, error: storageError } = await supabase.storage
                    .from('videos')
                    .upload(fileName, file);

                if (storageError) throw storageError;

                // 2. Public URL 가져오기
                const { data: { publicUrl } } = supabase.storage.from('videos').getPublicUrl(fileName);

                // 3. Supabase Database 기록
                const { error: dbError } = await supabase.from('uploads').upsert({
                    student_id: studentId,
                    mission_time: time,
                    mission_topic: topic,
                    video_url: publicUrl,
                    display_text: previewText.value.trim(),
                    object_pos: `${Math.round(currentObjPos.x)},${Math.round(currentObjPos.y)}`
                }, { onConflict: 'student_id, mission_time' });

                if (dbError) throw dbError;

                // 4. 기존 구글 시트 기록 유지 (백업용 비동기 호출)
                fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        studentId, time, videoUrl: publicUrl,
                        text: `${previewText.value.trim()}||POS:${currentObjPos.x},${currentObjPos.y}`
                    })
                }).catch(e => console.log("시트 기록 실패(무시가능):", e));

                // UI 업데이트
                if (!UPLOADS[time]) UPLOADS[time] = {};
                UPLOADS[time][studentId] = {
                    videoUrl: publicUrl,
                    text: `${previewText.value.trim()}||POS:${currentObjPos.x},${currentObjPos.y}`
                };
                
                alert("업로드 완료!");
                closePreviewModal();
                renderApp();

            } catch (err) {
                console.error(err);
                alert("업로드 실패: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "올리기";
            }
        }

        function closePreviewModal() {
            previewModal.classList.add('opacity-0');
            setTimeout(() => { previewModal.classList.add('hidden'); previewVideo.src = ""; }, 300);
        }

        function populateGroupDropdown() {
            const groups = [...new Set(MOCK_SHEET_DATA.users.map(u => u.group))];
            groupSelect.innerHTML = groups.map(g => `<option value="${g}">${g}</option>`).join('');
            groupSelect.value = currentUser.group;
        }

        function handleGroupChange(g) {
            currentGroupMembers = MOCK_SHEET_DATA.users.filter(u => u.group === g);
            renderApp();
        }

        function renderApp() {
            mainScroll.innerHTML = groupMissions.map(mission => `
                <div class="min-w-full h-full flex flex-col p-2 gap-2 snap-center">
                    ${currentGroupMembers.map(member => {
                        const up = UPLOADS[mission.time]?.[member.id];
                        const isMe = member.id === currentUser.id;
                        let pos = '50% 50%', dText = '';
                        if (up) {
                            const p = up.text.split('||POS:');
                            dText = p[0];
                            if (p[1]) pos = p[1].replace(',','% ') + '%';
                        }

                        return `
                        <div class="relative flex-1 rounded-[24px] overflow-hidden bg-black shadow-sm flex items-center justify-center">
                            ${up ? `
                                <video src="${up.videoUrl}" autoplay loop muted playsinline style="object-position:${pos}"></video>
                                <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/40"></div>
                            ` : `
                                <div class="noise-bg"></div>
                                ${isMe ? `
                                    <label class="z-20 bg-pink-500 text-white px-4 py-2 rounded-full font-bold cursor-pointer text-sm">
                                        영상 선택
                                        <input type="file" accept="video/*" class="hidden" onchange="openPreviewModal(this,'${mission.time}','${member.id}','${mission.topic}')">
                                    </label>
                                ` : '<p class="text-white/30 font-bold text-xs">WAITING...</p>'}
                            `}
                            <div class="absolute inset-0 p-4 flex flex-col justify-between pointer-events-none">
                                <div class="flex justify-between items-start">
                                    <span class="bg-black/40 backdrop-blur-md text-white text-[10px] px-2.5 py-1 rounded-full border border-white/10">${member.id}</span>
                                    <span class="text-white/80 text-[10px]">${mission.date}</span>
                                </div>
                                <div class="text-center">
                                    <h2 class="text-white font-black text-4xl" style="text-shadow: 0 2px 10px rgba(0,0,0,0.5)">${mission.time}</h2>
                                    ${dText ? `<p class="inline-block bg-black/50 text-white text-[10px] px-3 py-1 rounded-lg mt-1">${dText}</p>` : ''}
                                </div>
                                <div class="text-right">
                                    <span class="text-white/90 text-[10px] bg-black/30 px-2 py-1 rounded">🎯 ${mission.topic}</span>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`).join('');
            updateDots();
        }

        function updateDots() {
            const idx = Math.round(mainScroll.scrollLeft / mainScroll.clientWidth);
            dotsContainer.innerHTML = groupMissions.map((m, i) => `
                <div class="transition-all duration-300 ${i === idx ? 'text-yellow-400 scale-125' : 'w-1.5 h-1.5 bg-gray-300 rounded-full'}">
                    ${i === idx ? '●' : ''}
                </div>
            `).join('');
            if (groupMissions[idx]) currentTimeDisplay.innerText = groupMissions[idx].time;
        }

        function scrollToMission(idx) {
            mainScroll.scrollTo({ left: mainScroll.clientWidth * idx, behavior: 'smooth' });
        }

        mainScroll.addEventListener('scroll', updateDots);

        // 드래그 조작 (미리보기)
        let isDragging = false, lastX, lastY;
        previewViewport.onpointerdown = e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; previewViewport.setPointerCapture(e.pointerId); };
        previewViewport.onpointermove = e => {
            if (!isDragging) return;
            currentObjPos.x = Math.max(0, Math.min(100, currentObjPos.x - (e.clientX - lastX) / 2));
            currentObjPos.y = Math.max(0, Math.min(100, currentObjPos.y - (e.clientY - lastY) / 2));
            previewVideo.style.objectPosition = `${currentObjPos.x}% ${currentObjPos.y}%`;
            lastX = e.clientX; lastY = e.clientY;
        };
        previewViewport.onpointerup = () => isDragging = false;

    </script>
</body>
</html>
